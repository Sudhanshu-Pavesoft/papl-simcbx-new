appId: com.electron.app
productName: simcbx-papl
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  # dev-only packages that electron-builder otherwise pulls in via peer deps
  - '!node_modules/electron/**'
  - '!node_modules/prisma/**'
  - '!node_modules/@prisma/engines/**'
asarUnpack:
  - resources/**
# The generated Prisma client lives in the dot-folder node_modules/.prisma,
# which electron-builder's node-module dependency collector skips because it
# is not a package in the dependency graph ('files' globs cannot force it in).
# Copy it as a real directory under resources/node_modules so that
# @prisma/client's require('.prisma/client/default') resolves via the normal
# node_modules ancestor walk, and the native query engine (.dll.node) loads
# from disk instead of from inside app.asar.
# @prisma/client must sit alongside it: the generated .prisma/client/index.js
# requires '@prisma/client/runtime/library.js', and the copy inside app.asar
# is not reachable from the real resources/node_modules directory.
extraResources:
  - from: node_modules/.prisma
    to: node_modules/.prisma
    filter:
      - '**/*'
  - from: node_modules/@prisma/client
    to: node_modules/@prisma/client
    filter:
      - '**/*'
win:
  executableName: simcbx-papl
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
mac:
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSCameraUsageDescription: Application requests access to the device's camera.
    - NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  notarize: false
dmg:
  artifactName: ${name}-${version}.${ext}
linux:
  target:
    - AppImage
    - snap
    - deb
  maintainer: electronjs.org
  category: Utility
appImage:
  artifactName: ${name}-${version}.${ext}
npmRebuild: false
publish:
  provider: generic
  url: https://example.com/auto-updates
