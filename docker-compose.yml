version: '3.9'

services:
  db:
    image: postgres:16
    container_name: simcbx_app

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mydb
    volumes:
      - ../../../simcbx-postgresql-data:/var/lib/postgresql/data
    ports:
      - '5434:5432'
    restart: always

volumes:
  postgres_data:
