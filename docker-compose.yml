version: '3.9'

services:
  db:
    image: postgres:16
    container_name: simcbx_app

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mydb
    volumes:
      - simcbx_postgres_data:/var/lib/postgresql/data
    ports:
      - '5435:5432'
    restart: always

volumes:
  simcbx_postgres_data:
